# .github/workflows/auto-label.yml
on:
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            if (body.includes('➕ Add New Tool')) {
              github.rest.issues.addLabels({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, labels: ['➕ add'] });
            } else if (body.includes('🔄 Update Existing Tool')) {
              github.rest.issues.addLabels({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, labels: ['🔄 update'] });
            } else if (body.includes('🗑️ Remove / Archive Tool')) {
              github.rest.issues.addLabels({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, labels: ['🗑️ archive'] });
            }